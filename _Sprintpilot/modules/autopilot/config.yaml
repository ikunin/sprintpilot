# Autopilot Configuration for Sprintpilot
# Controls /sprint-autopilot-on session behavior.

autopilot:
  # Adaptive Process Scaling profile.
  #
  #   nano   — toy / tutorial / learning project, solo, small codebase.
  #            Routes through bmad-quick-dev one-shot (PR 4+). Fastest.
  #   small  — MVP / internal tool / prototype, solo or 1–2 devs.
  #   medium — team product with real users. Default, recommended.
  #   large  — production system, compliance / uptime stakes. Full
  #            reconciliation, interactive retrospectives, tighter
  #            checkpoints, parallelism on by default.
  #   legacy — rollback to v1.0.5 behavior. No v2 optimizations active.
  #            Pinned by version_pinned in profiles/legacy.yaml so future
  #            changes cannot silently affect legacy users.
  #
  # Profile defaults live in _Sprintpilot/modules/autopilot/profiles/*.yaml.
  # Override specific knobs here or in git/ma config.yaml — user overrides
  # always win over profile defaults. See docs/adaptive-process-scaling.md.
  #
  # Missing key defaults to 'medium' (matches v1.0.5 behavior byte-for-byte).
  # Upgrading v1 installs don't need to set this; new installs get it from
  # the installer prompt or `sprintpilot install --profile <name>`.
  complexity_profile: medium

  # Maximum stories to FULLY IMPLEMENT in a single autopilot session.
  #
  # "Fully implement" means the complete per-story cycle:
  #   bmad-dev-story (RED → GREEN) + bmad-code-review + all patches applied
  #   + artifacts committed + (if git enabled) pushed & PR created.
  #
  # Creating a story file (bmad-create-story) without implementing it does
  # NOT count toward this limit. The counter only ticks up after step 7
  # ("Mark story done") completes successfully.
  #
  # When the Nth story's full cycle finishes, the autopilot writes state
  # and exits cleanly so the user can start a fresh session without hitting
  # context compaction mid-story.
  #
  # Set 0 to disable the limit and run until the sprint is complete.
  session_story_limit: 3

  # Retrospective handling at epic completion.
  #
  # - "auto" (default): autopilot generates a deterministic retrospective
  #   from sprint-status.yaml + decision-log.yaml, then continues with the
  #   next epic. Safe under every CLI including Gemini CLI — no external
  #   skill call, no persona simulation, single pass.
  # - "stop": autopilot pauses at epic completion so you can run
  #   /bmad-retrospective interactively. Re-run /sprint-autopilot-on to
  #   resume with the next epic.
  # - "skip": autopilot skips the retrospective entirely and continues.
  #   NOT RECOMMENDED — you lose the epic-level learning record.
  #
  # Background: the external bmad-retrospective skill can enter a
  # multi-persona discussion loop when driven by autopilot on some CLIs,
  # which exhausts the token/memory budget. That's why "auto" generates
  # the artifact inline instead of invoking the external skill.
  retrospective_mode: auto

  # Execution mode for the autopilot loop.
  #
  # - "legacy"       (default) — drives via the 1,388-line prose workflow.md.
  #                   Same byte-for-byte behavior as v2.0.x.
  # - "orchestrator" — drives via _Sprintpilot/bin/autopilot.js with a
  #                   typed Action/Signal protocol. The LLM owns in-skill
  #                   execution; flow control is deterministic. See
  #                   skills/sprint-autopilot-on/workflow.orchestrator.md.
  #
  # The orchestrator path is shipped behind this flag in v2.1+ so users can
  # opt in per project before it becomes the default in a later release.
  execution_mode: legacy
