addon:
  name: sprintpilot
  version: 2.7.0
  description: Sprintpilot — autopilot and multi-agent addon for BMad Method (git workflow, parallel agents, autonomous story execution)
  # Floor is 6.2.1: the nano profile relies on bmad-quick-dev's step-oneshot.md,
  # which first appears in 6.2.1. Tested through BMad Method v6.8.0.
  bmad_compatibility: ">=6.2.1"
  modules:
    git:
      enabled: true
      config: modules/git/config.yaml
    ma:
      enabled: true
      config: modules/ma/config.yaml
    autopilot:
      enabled: true
      config: modules/autopilot/config.yaml
  installed_skills:
    - sprint-autopilot-on
    - sprint-autopilot-off
    - sprintpilot-update
    - sprintpilot-codebase-map
    - sprintpilot-assess
    - sprintpilot-reverse-architect
    - sprintpilot-migrate
    - sprintpilot-research
    - sprintpilot-plan-sprint
    - sprintpilot-sprint-progress
    - sprintpilot-dependency-graph
