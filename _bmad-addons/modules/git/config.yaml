# Git Workflow Configuration for BMAD Autopilot Add-On
# Worktrees are managed by Claude Code's EnterWorktree tool at .claude/worktrees/{name}

git:
  enabled: true # false = all git ops silently skip
  base_branch: main
  # Git status is tracked in git-status.yaml (addon-owned), NOT sprint-status.yaml (BMAD-owned)
  # git_status_file resolves to: {implementation_artifacts}/git-status.yaml

  # Branch naming
  branch_prefix: "story/"
  max_branch_length: 60 # Truncate + 6-char hash if longer

  # Commit message templates
  # Placeholders: {story-key}, {epic}, {story-title}, {patch-title}
  commit_templates:
    story: "feat({epic}): {story-title} ({story-key})"
    patch: "fix({story-key}): {patch-title}"

  # Placeholder resolution chain: sprint-status.yaml -> story file -> fallback
  commit_placeholder_resolution:
    story-key: "from sprint-status.yaml development_status key"
    epic: "from story file epic header, fallback to story-key prefix (e.g., '1' from '1-3')"
    story-title: "from story file title, fallback to story-key"
    patch-title: "from review finding title, fallback to 'code review fix'"

  # File staging strategy
  staging:
    strategy: explicit # Always explicit file names, never git add -A
    source: git-diff-primary # git diff --name-only as primary source
    cross_reference: story-file-list # Story File List as sanity check
    pre_commit_checks:
      - verify_no_secrets
      - verify_gitignore_covers_addon
      - verify_file_size
      - verify_no_binaries
    secrets_scan:
      patterns:
        - API_KEY
        - SECRET
        - TOKEN
        - PASSWORD
        - aws_access
        - private_key
      severity: WARN # WARN (not BLOCK) — surfaces finding, doesn't halt
      allowlist_file: .secrets-allowlist
    max_file_size_mb: 1 # Reject files larger than this (configurable)
    verify_gitignore_entries: # Entries that must be in .gitignore
      - .autopilot.lock
      - .claude/.addon-backups/

  # Linting
  lint:
    enabled: true
    linters:
      python: [ruff, flake8, pylint]
      javascript: [eslint, biome]
      typescript: [eslint, biome]
      rust: [cargo clippy]
      go: [golangci-lint]
      ruby: [rubocop]
    auto_detect: true # Detect project language from manifest files
    scope: changed-files # Only lint files changed in this story
    blocking: false # Warn-only, never halt
    output_limit: 100 # Max lines injected into context
    output_strategy: errors-first # Show all errors first, then fill with warnings
    full_output_file: true # Save full output to file, reference path

  # Push & PR
  push:
    auto: true
    create_pr: true
    pr_body: heredoc # Use HEREDOC for gh/glab

  # Merge
  merge:
    timing: epic-retrospective
    require_user_confirm: true

  # Worktree settings (location managed by EnterWorktree at .claude/worktrees/)
  worktree:
    submodule_init: auto # auto = only if .gitmodules exists
    submodule_timeout: 30 # Seconds
    cleanup_on_merge: true # ExitWorktree(action: "remove") after story merged
    health_check_on_boot: true # Check for orphaned worktrees from crashed sessions

  # Lock file
  lock:
    enabled: true
    file: .autopilot.lock
    stale_timeout_minutes: 30
    # Lock contains: epoch timestamp + session UUID. No PID (unreliable).
    # All time math done in Bash (date +%s), not by the LLM.

  # Platform detection
  platform:
    provider: auto # auto | github | gitlab | git_only
    # Detection priority:
    #   1. Explicit provider in this config (if not "auto")
    #   2. CLI detection: which CLIs are installed (gh, glab)
    #   3. Remote URL regex as last resort
    # Runs once at autopilot boot, cached for session.
    # Re-detect only if a platform command fails.
