addon:
  name: bmad-ma-git
  version: 1.0.6
  description: Multi-agent execution + git workflow integration for BMAD
  bmad_compatibility: ">=6.2.0"
  modules:
    git:
      enabled: true
      config: modules/git/config.yaml
    ma:
      enabled: true
      config: modules/ma/config.yaml
  installed_skills:
    - bmad-autopilot-on
    - bmad-autopilot-off
    - bmad-ma-code-review
    - bmad-ma-codebase-map
    - bmad-ma-assess
    - bmad-ma-reverse-architect
    - bmad-ma-migrate
    - bmad-ma-research
    - bmad-ma-party-mode
