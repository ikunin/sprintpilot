addon:
  name: bmad-ma-git
  version: 2.0.0
  description: Multi-agent execution + git workflow integration for BMAD
  bmad_compatibility: ">=6.2.0"
  modules:
    git:
      enabled: true
      config: modules/git/config.yaml
    ma:
      enabled: true
      config: modules/ma/config.yaml
  installed_skills:
    # v1.0 — Git workflow
    - bmad-autopilot-on
    - bmad-autopilot-off
    # v1.1 — Parallel code review
    - bmad-ma-code-review
    # v2.0 — Brownfield intelligence
    - bmad-ma-codebase-map
    - bmad-ma-assess
    - bmad-ma-reverse-architect
    - bmad-ma-migrate
    - bmad-ma-research
    - bmad-ma-party-mode
